# This is a basic workflow to help you get started with Actions

# Workflow name
name: First Workflow

# Controls when the workflow will run
on: workflow_dispatch # Allows you to run this workflow manually from the Actions tab

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # Stablish the workflow jobs by identation:

  # First job defined for this workflow
  first-job:

    # The type of runner that the job will run on -> Github actions runners (OSs available)
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:

      # Runs a single or a set of commands using the runners shell
      - name: Run a one-line script -> greeting
        run: echo "Hello, world!"
      - name: Run a one-line script -> farewell
        run: echo "Goodbye!"

      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      #- uses: actions/checkout@v4
  
  
